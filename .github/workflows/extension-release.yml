name: Extension Release

on:
  push:
    tags:
      - "extension@*"
  workflow_dispatch:

permissions:
  contents: write

concurrency: extension-release-${{ github.ref }}

env:
  BUN_VERSION: 1.2.6
  NODE_VERSION: 20

jobs:
  publish-extension:
    runs-on: ubuntu-latest
    environment: extension-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-bun${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}

      - name: Install Monorepo Dependencies
        run: bun install
        timeout-minutes: 5

      - name: Type Check Extension
        working-directory: apps/extension
        run: bun run typecheck
        env:
          FORCE_COLOR: 1

      - name: Build Extension
        working-directory: apps/extension
        run: bun run build
        env:
          FORCE_COLOR: 1

      - name: Package Extension
        working-directory: apps/extension
        run: bun run package
        env:
          FORCE_COLOR: 1

      - name: Create VSIX Package
        working-directory: apps/extension/vsix-build
        run: bunx vsce package --no-dependencies
        env:
          FORCE_COLOR: 1

      - name: Get VSIX filename
        id: vsix-info
        working-directory: apps/extension/vsix-build
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name "*.vsix" -type f | head -n1 | xargs basename)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No VSIX file found"
            exit 1
          fi
          echo "vsix-filename=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_FILE"

      - name: Publish to VS Code Marketplace
        working-directory: apps/extension/vsix-build
        run: bunx vsce publish --packagePath "${{ steps.vsix-info.outputs.vsix-filename }}"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          FORCE_COLOR: 1

      - name: Publish to Open VSX Registry
        working-directory: apps/extension/vsix-build
        run: bunx ovsx publish "${{ steps.vsix-info.outputs.vsix-filename }}"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          FORCE_COLOR: 1

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-release-${{ github.ref_name }}
          path: |
            apps/extension/vsix-build/*.vsix
            apps/extension/dist/
          retention-days: 90

  notify-success:
    needs: publish-extension
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Success Notification
        run: |
          echo "🎉 Extension ${{ github.ref_name }} successfully published!"
          echo "📦 Available on VS Code Marketplace"
          echo "🌍 Available on Open VSX Registry"
          echo "🏷️ GitHub release created: ${{ github.ref_name }}"
